<!DOCTYPE html>
<html lang="en">
<head>
  <!-- META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="LustSphere - Enter the Realm of Desire." />
  <meta name="theme-color" content="#000000" />

  <title>LustSphere | Enter the Realm of Desire </title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="lustsphere-page">

  <main>

    <!-- HERO -->
    <header class="hero-header">
      <img 
        src="images/Logos/LustSphere-logo.png" 
        alt="LinkSphere Logo"
        class="site-logo"
        loading="eager"
      >
    </header>

  
    <!-- CATEGORY SECTION -->
    <section class="center-group" aria-labelledby="category-heading">

      <h1 id="category-heading" class="category-heading">
        Models
      </h1>

      <div class="section-divider"></div>

      <!-- CATEGORIES -->
     
      <div class="category-grid">

        <!-- Melimtx -->
        <div class="collections-wrapper">
          <a href="Melimtx-Collections.html"
             class="category-tab"
             data-id="Melimtx"
             aria-label="Melimtx Collection">
            Melimtx
          </a>

          <img class="collections-hover-img"
               src="images/Melimtx/melimtx-banner.webp"
               alt="Melimtx preview"
               loading="lazy" />
        </div>

        <!-- Mikayla Demaiter -->
         <div class="collections-wrapper">
           <a href="MikaylaD.html"
             class="category-tab"
             data-id="MikaylaD"
             aria-label="Mikayla Demaiter Collection">
             Mikayla Demaiter
           </a>

            <img class="collections-hover-img"
             src="images/Mikayla_Demaiter/MKD_Preview_Cover.webp"
             alt="Mikayla Demaiter preview"
             loading="lazy" />
         </div>
       </div>
     

       <div class="section-divider"></div>

    </section>

  </main>

  <!-- AGE CONFIRMATION MODAL -->
  <div id="ageModal" class="modal">
    <div class="modal-content">
      <h2>Age Confirmation</h2>
      <p>You must be 18+ to enter this category.</p>
      <div class="modal-buttons">
        <button id="ageConfirm" class="btn primary">I am 18+</button>
        <button id="ageDecline" class="btn">Exit</button>
      </div>
    </div>
  </div>

  <!-- FOOTER INFO MODAL -->
  <div id="infoModal" class="modal">
    <div class="modal-content">
      <h2 id="infoTitle"></h2>
      <p id="infoText"></p>
      <button id="infoClose" class="btn primary">Close</button>
    </div>
  </div>

<!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 LinkSphere. All rights reserved.</p>
  </footer>

  <script src="script.js" defer></script>

</body>
</html>
