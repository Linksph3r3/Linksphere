<!DOCTYPE html>
<html lang="en">
<head>
  <!-- META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="LinkSphere - Curated Collections.Zero Noise" />
  <meta name="theme-color" content="#000000" />

  <title>LinkSphere | Curated Collections.Zero Noise</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="index-page">

  <main>

    <!-- HERO -->
    <header class="hero-header">
      <img 
        src="images/Logos/LinkSphere-logo.png" 
        alt="LinkSphere Logo"
        class="site-logo"
        loading="eager"
      >
    </header>

    <!-- FOOTER (MOVED UNDER LOGO FOR INDEX ONLY) -->
    <site-info class="site-info">
      <div class="info-links">|
        <a href="#" data-modal="about">About</a>|
        <a href="#" data-modal="privacy">Privacy</a>|
        <a href="#" data-modal="terms">Terms & Conditions</a>|
        <a href="#" data-modal="contact">Contact</a>|
      </div>
      <div class="section-divider"></div>
    </site-info>
    

    <!-- CATEGORY SECTION -->
    <section class="center-group" aria-labelledby="category-heading">

      <h1 id="category-heading" class="category-heading">
        Link Categories
      </h1>

      <div class="section-divider"></div>

      <nav class="category-grid">
        <a href="#" id="open-nsfw" class="category-tab">
          LustSphere
        </a>
      </nav>

      <div class="section-divider"></div>

    </section>

  </main>

  <!-- AGE CONFIRMATION MODAL -->
  <div id="ageModal" class="modal">
    <div class="modal-content">
      <h2>Age Confirmation</h2>
      <p>You must be 18+ to enter this category.</p>
      <div class="modal-buttons">
        <button id="ageConfirm" class="btn primary">I am 18+</button>
        <button id="ageDecline" class="btn">Exit</button>
      </div>
    </div>
  </div>

  <!-- FOOTER INFO MODAL -->
  <div id="infoModal" class="modal">
    <div class="modal-content">
      <h2 id="infoTitle"></h2>
      <p id="infoText"></p>
      <button id="infoClose" class="site-info-btn-primary">Close</button>
    </div>
  </div>

<!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 LinkSphere. All rights reserved.</p>
  </footer>

  <script src="script.js" defer></script>

</body>
</html>
